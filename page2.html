<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8/3 Magic Particles AI</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* UI Control Panel */
        #ui-container {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(20, 20, 20, 0.8); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }
        .video-container { position: relative; width: 180px; height: 135px; margin-top: 10px; border: 2px solid #ff4d6d; border-radius: 8px; overflow: hidden; }
        #webcam-preview { width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }
        #hand-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        #status { font-size: 11px; color: #ff4d6d; margin-top: 8px; font-weight: bold; }
        
        /* Rotate Device Overlay */
        #rotate-device {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; text-align: center;
        }
        #rotate-device svg { width: 60px; fill: #ff4d6d; animation: rotateAnim 2s infinite; }
        @keyframes rotateAnim { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } }
        @media screen and (orientation: portrait) and (max-width: 900px) { #rotate-device { display: flex; } }

        canvas { display: block; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>

<div id="rotate-device">
    <svg viewBox="0 0 24 24"><path d="M16.48 2.52c3.27 1.55 5.61 4.72 5.97 8.48h2l-3 3-3-3h2c-.35-3.11-2.23-5.73-4.91-7.01l1.01-1.47c-.01 0-.05-.01-.07-.01zm-15.48 9.48c.35 3.11 2.23 5.73 4.91 7.01l-1.01 1.47c.01 0 .05.01.07.01-3.27-1.55-5.61-4.72-5.97-8.48h-2l3-3 3 3h-2z"/></svg>
    <p>Vui lòng xoay ngang màn hình!</p>
</div>

<div id="ui-container">
    <h4 style="margin:0; color:#ff4d6d">8/3 MAGIC AI</h4>
    <div class="video-container">
        <video id="webcam-preview" playsinline></video>
        <canvas id="hand-canvas"></canvas>
    </div>
    <div id="status">Khởi tạo AI...</div>
</div>

<script>
    // --- 1. SETUP THREE.JS ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
    camera.position.z = 250;
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const PARTICLE_COUNT = 8500;
    const heartPos = new Float32Array(PARTICLE_COUNT * 3);
    const textPos = new Float32Array(PARTICLE_COUNT * 3);
    const circlePos = new Float32Array(PARTICLE_COUNT * 3);
    const currentPos = new Float32Array(PARTICLE_COUNT * 3);

    // Tạo hình Trái tim
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const t = Math.random() * Math.PI * 2;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        heartPos[i*3] = x * 4.5; heartPos[i*3+1] = y * 4.5; heartPos[i*3+2] = (Math.random()-0.5)*15;
    }

    // Tạo hình chữ 8/3 (Canvas map)
    const tCtx = document.createElement('canvas').getContext('2d');
    tCtx.canvas.width = 1000; tCtx.canvas.height = 300;
    tCtx.fillStyle = 'white'; tCtx.font = 'bold 150px Arial'; tCtx.textAlign = 'center';
    tCtx.fillText('8/3 VUI VẺ', 500, 180);
    const tData = tCtx.getImageData(0, 0, 1000, 300).data;
    const tPixels = [];
    for(let y=0; y<300; y+=3) for(let x=0; x<1000; x+=3) {
        if(tData[(y*1000+x)*4] > 128) tPixels.push({x: (x-500)*0.6, y: (150-y)*0.6});
    }
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = tPixels[i % tPixels.length];
        textPos[i*3] = p.x; textPos[i*3+1] = p.y; textPos[i*3+2] = (Math.random()-0.5)*10;
    }

    // Tạo hình Vòng tròn (Rộng hơn để chứa ảnh)
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 110 + Math.random() * 8; 
        circlePos[i*3] = Math.cos(angle) * radius;
        circlePos[i*3+1] = Math.sin(angle) * radius;
        circlePos[i*3+2] = (Math.random()-0.5)*5;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(currentPos, 3));
    const material = new THREE.PointsMaterial({ size: 1.8, color: 0xff4d6d, transparent: true, blending: THREE.AdditiveBlending });
    const points = new THREE.Points(geometry, material);
    scene.add(points);

    // --- 2. HÌNH ẢNH BO TRÒN CÓ VIỀN ---
    const imageCanvas = document.createElement('canvas');
    const imageCtx = imageCanvas.getContext('2d');
    imageCanvas.width = 512; imageCanvas.height = 512;
    const canvasTexture = new THREE.CanvasTexture(imageCanvas);
    
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = 'picture1.png'; // Thay bằng link ảnh của bạn
    img.onload = () => {
        const cx = 256, cy = 256;
        imageCtx.beginPath();
        imageCtx.arc(cx, cy, 240, 0, Math.PI*2);
        imageCtx.lineWidth = 15; imageCtx.strokeStyle = '#ff4d6d'; imageCtx.stroke();
        imageCtx.save();
        imageCtx.beginPath(); imageCtx.arc(cx, cy, 230, 0, Math.PI*2); imageCtx.clip();
        const sc = Math.max(512/img.width, 512/img.height);
        imageCtx.drawImage(img, cx-img.width*sc/2, cy-img.height*sc/2, img.width*sc, img.height*sc);
        imageCtx.restore();
        canvasTexture.needsUpdate = true;
    };

    const imageMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(160, 160),
        new THREE.MeshBasicMaterial({ map: canvasTexture, transparent: true, opacity: 0, side: THREE.DoubleSide })
    );
    scene.add(imageMesh);

    // --- 3. ANIMATION & LOGIC ---
    let state = 'heart';
    let targetRotY = 0;

    function animate() {
        requestAnimationFrame(animate);
        
        let targetData = (state === 'heart') ? heartPos : (state === 'text' ? textPos : circlePos);
        const pos = geometry.attributes.position.array;
        
        // Tốc độ chuyển đổi hạt (0.2 cực nhanh)
        for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
            pos[i] += (targetData[i] - pos[i]) * 0.2;
        }
        geometry.attributes.position.needsUpdate = true;

        // Hiện/Ẩn ảnh
        imageMesh.material.opacity += ((state === 'circle' ? 1 : 0) - imageMesh.material.opacity) * 0.15;

        // Xoay tốc độ cao theo tay
        points.rotation.y += (targetRotY - points.rotation.y) * 0.3;
        imageMesh.rotation.y = points.rotation.y;

        renderer.render(scene, camera);
    }
    animate();

    // --- 4. AI HAND TRACKING ---
    const videoElement = document.getElementById('webcam-preview');
    const canvasElement = document.getElementById('hand-canvas');
    const canvasCtx = canvasElement.getContext('2d');

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.75 });

    hands.onResults((res) => {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
            const lm = res.multiHandLandmarks[0];
            drawConnectors(canvasCtx, lm, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            drawLandmarks(canvasCtx, lm, {color: '#FF0000', lineWidth: 1, radius: 2});

            // Xoay (Biên độ 5.0)
            targetRotY = (lm[0].x - 0.5) * 5.0;

            // Nhận diện cử chỉ
            const distOK = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
            const distOpen = Math.hypot(lm[12].x - lm[0].x, lm[12].y - lm[0].y);

            if (distOK < 0.05) state = 'circle';
            else if (distOpen > 0.4) state = 'text';
            else state = 'heart';
            
            document.getElementById('status').innerText = "AI Online - " + state.toUpperCase();
        } else {
            state = 'heart';
            document.getElementById('status').innerText = "Chờ bàn tay...";
        }
    });

    const cameraAI = new Camera(videoElement, {
        onFrame: async () => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            await hands.send({image: videoElement});
        },
        width: 640, height: 480
    });
    cameraAI.start();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
    window.onresize();

</script>
</body>
</html>
